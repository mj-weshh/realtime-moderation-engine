version: '3.8'

# Services will be added incrementally per phase:
# neo4j, producer_service, ml_consumer, backend_api, frontend.
services:
  # Kafka in KRaft mode (no ZooKeeper): the broker manages its own metadata
  # quorum. Required since Kafka 4.0 / cp-kafka 8.x removed ZooKeeper support.
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      # Host access for local tooling (kcat, scripts run outside Docker).
      - "9092:9092"
    environment:
      # Combined mode: this single node acts as both broker and controller.
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      # Listeners: PLAINTEXT (kafka:29092) for container-to-container traffic
      # on moderation_network; PLAINTEXT_HOST (localhost:9092) for clients on
      # the host machine; CONTROLLER (29093) for KRaft quorum traffic only.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker dev cluster: internal topics can't replicate beyond 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Fixed cluster ID (base64 UUID) so log dirs stay valid across restarts.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - moderation_network

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      # Visual topic/consumer inspection at http://localhost:8080
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # Uses the internal listener since the UI runs inside moderation_network.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - moderation_network

  producer_service:
    build: ./producer_service
    container_name: producer_service
    depends_on:
      - kafka
    environment:
      # Internal listener: containers reach the broker via service-name DNS.
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MESSAGES_PER_SECOND: 50
    volumes:
      # Dataset mounted read-only instead of baked into the image (~400MB).
      - ./data:/data:ro
    networks:
      - moderation_network

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474" # HTTP browser UI
      - "7687:7687" # Bolt protocol (drivers)
    environment:
      NEO4J_AUTH: neo4j/testpassword
    volumes:
      # Bind mount so graph data survives container recreation.
      - ./neo4j_data:/data
    networks:
      - moderation_network

  ml_consumer:
    build: ./ml_consumer
    container_name: ml_consumer
    depends_on:
      - kafka
      - neo4j
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
    volumes:
      - ./ml_consumer/model_cache:/app/model_cache
    networks:
      - moderation_network

networks:
  # Custom bridge network: containers attached to it resolve each other by
  # service name via Docker's embedded DNS (e.g. "kafka:9092"), so we never
  # depend on ephemeral container IP addresses.
  moderation_network:
    driver: bridge
