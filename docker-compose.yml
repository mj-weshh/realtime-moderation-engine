version: '3.8'

# Services will be added incrementally per phase:
# neo4j, producer_service, ml_consumer, backend_api, frontend.
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - moderation_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      # Host access for local tooling (kcat, scripts run outside Docker).
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listeners: PLAINTEXT (kafka:29092) for container-to-container
      # traffic on moderation_network; PLAINTEXT_HOST (localhost:9092) for
      # clients running on the host machine.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker dev cluster: internal topics can't replicate beyond 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - moderation_network

  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    depends_on:
      - kafka
    ports:
      # Visual topic/consumer inspection at http://localhost:8080
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # Uses the internal listener since the UI runs inside moderation_network.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - moderation_network

networks:
  # Custom bridge network: containers attached to it resolve each other by
  # service name via Docker's embedded DNS (e.g. "kafka:9092"), so we never
  # depend on ephemeral container IP addresses.
  moderation_network:
    driver: bridge
